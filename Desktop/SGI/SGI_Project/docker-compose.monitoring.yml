# Stack d'observabilité SGI (opt-in) — à combiner avec docker-compose.yml :
#   docker compose -f docker-compose.yml -f docker-compose.override.yml \
#     -f docker-compose.monitoring.yml up -d prometheus grafana node-exporter cadvisor
# Ou simplement : `make monitoring`.
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: sgi-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.3.0
    container_name: sgi-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    networks:
      - backend

  # Métriques hôte (Linux prod ; sur Docker Desktop macOS, mesure la VM).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: sgi-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - backend

  # Métriques par conteneur.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: sgi-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - backend

networks:
  backend:
  frontend:

volumes:
  prometheus_data:
  grafana_data:
