name: sgi

services:
  # ── Frontend Backoffice ───────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy

  # ── Frontend Portal ───────────────────────────────────────────────────
  portal:
    build:
      context: ./apps/portal
      target: runner
    ports:
      - "3001:3001"
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy

  # ── FastAPI ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    env_file: .env
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery Worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
    command: uv run celery -A app.tasks.celery_app worker -l info -Q notifications,exports,reminders
    env_file: .env
    networks:
      - backend
    depends_on:
      - db
      - valkey

  # ── Celery Beat ───────────────────────────────────────────────────────
  beat:
    build:
      context: ./apps/api
    command: uv run celery -A app.tasks.celery_app beat -l info
    env_file: .env
    networks:
      - backend
    depends_on:
      - valkey

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgi}
      POSTGRES_USER: ${POSTGRES_USER:-sgi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgi_user}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Valkey ────────────────────────────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Meilisearch ───────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    platform: linux/amd64
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    networks:
      - backend

  # ── MinIO ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    platform: linux/amd64
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - backend

  # ── Nginx ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - frontend
    depends_on:
      - web
      - api

  # ── Certbot ───────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    profiles:
      - ssl

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  valkey_data:
  meili_data:
  minio_data:
  certbot_www:
  certbot_certs:
