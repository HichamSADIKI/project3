# ── SGI Nginx (dev / staging) ─────────────────────────────────────────────
# Reverse proxy → web (back-office), portal (espace client/fournisseur), api
# Production HTTPS sera ajouté par certbot (server block 443 + redirect 80→443).
# Sécurité globale chargée via /etc/nginx/conf.d/security.conf (auto-include).
# ──────────────────────────────────────────────────────────────────────────

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout  65;
  client_max_body_size 25m;
  gzip on;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # Headers de sécurité partagés (security.conf)
  include /etc/nginx/conf.d/*.conf;

  # ── Upstreams (services Docker) ─────────────────────────────────────────
  upstream sgi_api    { server api:8000;    keepalive 16; }
  upstream sgi_web    { server web:3000;    keepalive 16; }
  upstream sgi_portal { server portal:3001; keepalive 16; }

  # ── HTTP — portail public (default) ─────────────────────────────────────
  server {
    listen 80 default_server;
    server_name _;

    # ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # API → FastAPI
    location /api/ {
      proxy_pass http://sgi_api;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Health check API direct
    location = /health {
      proxy_pass http://sgi_api/health;
    }

    # Back-office sur /admin/ (réservé aux comptes staff)
    location /admin/ {
      proxy_pass http://sgi_web/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tout le reste → portail client/fournisseur (default)
    location / {
      proxy_pass http://sgi_portal;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
