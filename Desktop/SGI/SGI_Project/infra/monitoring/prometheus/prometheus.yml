# Prometheus — configuration de scrape SGI.
# Cibles sur le réseau `backend` du projet Compose (api, exporters).
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: sgi

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # API FastAPI — métriques applicatives (prometheus-fastapi-instrumentator).
  - job_name: sgi-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Métriques hôte (CPU/mémoire/disque) — Linux prod.
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Métriques conteneurs (cAdvisor) — Linux prod.
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
