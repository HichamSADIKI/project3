# Règles d'alerte SGI (métriques prometheus-fastapi-instrumentator + up).
groups:
  - name: sgi-api
    rules:
      - alert: ApiDown
        expr: up{job="sgi-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API SGI injoignable"
          description: "La cible sgi-api est DOWN depuis 1 minute."

      - alert: HighHttp5xxRate
        expr: sum(rate(http_requests_total{status="5xx"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'erreurs 5xx élevé"
          description: "Plus de 0,5 req/s en 5xx sur 5 minutes."

      - alert: HighRequestLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_highr_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence p95 > 1 s"
          description: "Le 95e percentile de latence dépasse 1 s sur 5 minutes."

      - alert: ApiHighMemory
        expr: process_resident_memory_bytes{job="sgi-api"} > 1.5e9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Mémoire API élevée"
          description: "La mémoire résidente de l'API dépasse 1,5 Go depuis 10 minutes."
