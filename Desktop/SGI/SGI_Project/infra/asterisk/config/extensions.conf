; Dialplan de dev — téléphonie Immobilier SGI.
;   600         → echo test (vérifie le média WebRTC bout-en-bout)
;   6001-6002   → appels internes entre agents (screen pop testable)
;   700         → file d'attente démo "support" (ACD entrant)
;
; ── Enregistrement des appels (PDPL UAE) ─────────────────────────────────────
; Conformité PDPL (Federal Decree-Law No. 45 of 2021) : tout appel enregistré
; est précédé d'une ANNONCE DE CONSENTEMENT informant l'interlocuteur que la
; communication peut être enregistrée. L'enregistrement n'est armé (MixMonitor)
; qu'APRÈS la diffusion de cette annonce.
;
; Les fichiers .wav sont écrits dans /var/spool/asterisk/monitor (chemin Asterisk
; par défaut pour Monitor/MixMonitor). Ce répertoire DOIT être monté sur un
; volume Docker partagé avec un worker d'upload (voir wiring_needed : volume
; asterisk-recordings). Le nom de fichier porte l'UNIQUEID Asterisk pour pouvoir
; rapprocher l'enregistrement du CDR applicatif (table calls) via la colonne
; recording_url / le channel_id.

[globals]
; Répertoire de stockage des enregistrements (volume Docker partagé).
RECORDING_DIR=/var/spool/asterisk/monitor
; Annonce de consentement PDPL — BILINGUE arabe + anglais (marché UAE).
; En prod : déposer les prompts vocaux dans /var/lib/asterisk/sounds/custom/
; (voir infra/asterisk/sounds/README.md) et pointer ces variables dessus, ex. :
;   PDPL_NOTICE_AR=custom/pdpl-notice-ar
;   PDPL_NOTICE_EN=custom/pdpl-notice-en
; Par défaut (dev), on reste sur un bip neutre tant que les assets ne sont pas
; fournis — la chaîne joue AR puis EN.
PDPL_NOTICE_AR=beep
PDPL_NOTICE_EN=beep

[macro-pdpl-record]
; Macro réutilisable : diffuse l'annonce PDPL bilingue (AR puis EN) PUIS arme
; l'enregistrement mixé (les deux pattes dans un seul .wav).
; ${UNIQUEID} identifie l'appel de façon unique côté Asterisk.
exten => s,1,NoOp(PDPL : annonce de consentement bilingue avant enregistrement)
 same => n,Playback(${PDPL_NOTICE_AR})
 same => n,Playback(${PDPL_NOTICE_EN})
 same => n,Set(MONITOR_FILENAME=${RECORDING_DIR}/${UNIQUEID})
 same => n,MixMonitor(${MONITOR_FILENAME}.wav,b)
 same => n,Set(CDR(recordingfile)=${MONITOR_FILENAME}.wav)
 same => n,NoOp(Enregistrement armé : ${MONITOR_FILENAME}.wav)

[internal]
; Echo test : valide micro/haut-parleur + DTLS-SRTP côté navigateur.
exten => 600,1,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; Appels internes entre agents WebRTC (6001 ↔ 6002).
; Annonce PDPL + MixMonitor armé avant la mise en relation.
exten => _6XXX,1,NoOp(Appel interne vers ${EXTEN})
 same => n,Macro(pdpl-record)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; File d'attente entrante (démo ACD).
; Annonce PDPL + MixMonitor armé avant le passage en file.
exten => 700,1,Answer()
 same => n,Macro(pdpl-record)
 same => n,Queue(support)
 same => n,Hangup()
