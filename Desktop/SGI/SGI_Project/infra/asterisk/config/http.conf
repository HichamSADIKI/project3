; Serveur HTTP intégré d'Asterisk — porte le WebSocket de la signalisation
; SIP (chan_pjsip + res_http_websocket). ws:// sur 8088, wss:// sur 8089.
; Le softphone web (JsSIP) se connecte sur wss://<host>:8089/ws.

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088

; TLS pour le WSS (WebRTC). Certificat auto-signé généré par l'entrypoint (dev).
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
tlscertfile=/etc/asterisk/keys/asterisk.crt
tlsprivatekey=/etc/asterisk/keys/asterisk.key
