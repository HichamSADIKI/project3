; ─────────────────────────────────────────────────────────────────────────
; PJSIP — téléphonie Immobilier SGI (dev)
;
; Transports : ws/wss pour les softphones WebRTC du backoffice, udp réservé à
; une future trunk SIP opérateur UAE (config séparée, hors scope dev).
;
; Deux extensions de test agent : 6001 et 6002 (WebRTC). Secrets de dev — à
; remplacer par des comptes provisionnés dynamiquement en phase 2/prod.
; ─────────────────────────────────────────────────────────────────────────

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ── Gabarit endpoint WebRTC (réutilisé par les agents) ────────────────────
[webrtc-agent](!)
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=opus
webrtc=yes
dtls_auto_generate_cert=yes
direct_media=no

[webrtc-auth](!)
type=auth
auth_type=userpass

[webrtc-aor](!)
type=aor
max_contacts=1
remove_existing=yes

; ── Agent 6001 ────────────────────────────────────────────────────────────
[6001](webrtc-agent)
auth=6001
aors=6001

[6001](webrtc-auth)
username=6001
password=sgi-dev-6001

[6001](webrtc-aor)

; ── Agent 6002 ────────────────────────────────────────────────────────────
[6002](webrtc-agent)
auth=6002
aors=6002

[6002](webrtc-auth)
username=6002
password=sgi-dev-6002

[6002](webrtc-aor)
