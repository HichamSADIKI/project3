name: sgi

services:
  # ── Frontend Backoffice ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      # Proxy server-side vers le backend (réseau interne Docker).
      - BACKEND_API_URL=http://api:8000
      # DOIT correspondre au SECRET_KEY du backend : le middleware Edge
      # re-vérifie la signature du JWT émis par le backend.
      - JWT_SECRET=${SECRET_KEY}
      - NEXT_PUBLIC_PORTAL_URL=http://localhost:3001
      # SSO OAuth — le BFF (routes /api/auth/oauth/*) construit l'URL
      # d'autorisation à partir du client_id. Le SECRET reste exclusivement côté
      # API (service `api`, via env_file). Vides → boutons « non configuré ».
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - APPLE_OAUTH_CLIENT_ID=${APPLE_OAUTH_CLIENT_ID:-}
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy

  # ── Frontend Portal ───────────────────────────────────────────────────
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      target: runner
    ports:
      - "3001:3001"
    environment:
      - BACKEND_API_URL=http://api:8000
      - JWT_SECRET=${SECRET_KEY}
      - NEXT_PUBLIC_DEFAULT_COMPANY_SLUG=${NEXT_PUBLIC_DEFAULT_COMPANY_SLUG:-infinity-uae}
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy

  # ── FastAPI ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    env_file: .env
    # Code source monté : les modifications sont prises en compte sans rebuild
    # (le venv reste dans l'image à /app/.venv, non masqué par ces montages).
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/migrations:/app/migrations
      - ./apps/api/scripts:/app/scripts
      # Fixtures pytest partagées — requises par `docker compose exec api pytest`.
      - ./apps/api/conftest.py:/app/conftest.py
    # Hot-reload dev : uvicorn redémarre à chaque changement de fichier.
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      # curl n'est pas dans python:3.13-slim — on utilise urllib (stdlib).
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery Worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
    command: uv run celery -A app.tasks.celery_app worker -l info -Q notifications,exports,reminders
    env_file: .env
    # Même code source que l'API (restart requis pour recharger les tâches).
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/scripts:/app/scripts
      # Enregistrements Asterisk : le worker lit les .wav, les uploade vers
      # MinIO puis les déplace (uploaded/ ou orphan/) → accès rw requis.
      - asterisk_recordings:/var/spool/asterisk/monitor
    networks:
      - backend
    depends_on:
      - db
      - valkey

  # ── Celery Beat ───────────────────────────────────────────────────────
  beat:
    build:
      context: ./apps/api
    command: uv run celery -A app.tasks.celery_app beat -l info
    env_file: .env
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/scripts:/app/scripts
    networks:
      - backend
    depends_on:
      - valkey

  # ── Docker socket proxy (D2 — contrôle serveurs, surface minimale) ─────
  # Expose l'API Docker en TCP INTERNE, filtrée CONTAINERS + POST uniquement
  # (tout le reste refusé). NON publié. Profil "control" → ÉTEINT par défaut :
  # double verrou avec INFRA_CONTROL_ENABLED. Seul worker-infra peut le joindre.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    environment:
      CONTAINERS: "1"
      POST: "1"
      IMAGES: "0"
      EXEC: "0"
      VOLUMES: "0"
      NETWORKS: "0"
      SERVICES: "0"
      SWARM: "0"
      SECRETS: "0"
      CONFIGS: "0"
      INFO: "0"
      AUTH: "0"
      BUILD: "0"
      COMMIT: "0"
      DISTRIBUTION: "0"
      NODES: "0"
      PLUGINS: "0"
      SYSTEM: "0"
      TASKS: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend
    restart: unless-stopped
    profiles: ["control"]

  # ── Worker Celery DÉDIÉ au contrôle serveurs (queue "infra") ───────────
  # Seul service applicatif autorisé à joindre docker-socket-proxy. Démarré
  # uniquement avec `--profile control` ; n'agit que si INFRA_CONTROL_ENABLED=true.
  worker-infra:
    build:
      context: ./apps/api
    command: uv run celery -A app.tasks.celery_app worker -l info -Q infra
    env_file: .env
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/scripts:/app/scripts
    networks:
      - backend
    depends_on:
      - db
      - valkey
      - docker-socket-proxy
    profiles: ["control"]

  # ── Worker Celery DÉDIÉ à la génération de code (queue "studio", Phase 3) ──
  # Seul service autorisé à exécuter git/gh. Démarré uniquement avec
  # `--profile studio` ; n'agit que si STUDIO_CODEGEN_ENABLED=true ET avec un
  # STUDIO_GH_TOKEN fine-grained (contents+pull_requests:write, JAMAIS merge).
  # Maintient son PROPRE clone isolé dans le volume `studio_worktrees` (jamais le
  # checkout hôte). N'auto-merge JAMAIS : au mieux il ouvre une PR.
  worker-studio:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.studio
    command: uv run celery -A app.tasks.celery_app worker -l info -Q studio
    env_file: .env
    environment:
      - STUDIO_CODEGEN_ENABLED=${STUDIO_CODEGEN_ENABLED:-false}
      - STUDIO_GH_TOKEN=${STUDIO_GH_TOKEN:-}
      - STUDIO_REPO_URL=${STUDIO_REPO_URL:-}
      - STUDIO_WORKTREE_BASE=/worktrees
      - STUDIO_REPO_DIR=/worktrees/repo
      - STUDIO_WORKER_APP_DIR=/app
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/scripts:/app/scripts
      - studio_worktrees:/worktrees
    networks:
      - backend
    depends_on:
      - db
      - valkey
    profiles: ["studio"]

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgi}
      POSTGRES_USER: ${POSTGRES_USER:-sgi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgi_user}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Valkey ────────────────────────────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Meilisearch ───────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    platform: linux/amd64
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    networks:
      - backend

  # ── MinIO ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    platform: linux/amd64
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      # API S3 exposée à l'hôte → présignature joignable par le navigateur (MINIO_PUBLIC_ENDPOINT).
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend

  # ── Asterisk (téléphonie WebRTC — dev) ───────────────────────────────
  asterisk:
    build:
      context: ./infra/asterisk
    env_file: .env
    environment:
      AMI_PASSWORD: ${AMI_PASSWORD}
      ASTERISK_TLS_CN: ${ASTERISK_TLS_CN:-asterisk.sgi.local}
    ports:
      - "8088:8088"                    # ws  — signalisation SIP
      - "8089:8089"                    # wss — signalisation WebRTC (softphone)
      - "10000-10100:10000-10100/udp"  # RTP — média
    # AMI (5038) volontairement NON publié : joignable seulement via le réseau
    # `backend` par l'API (asterisk:5038).
    volumes:
      # Enregistrements PDPL écrits par MixMonitor (RECORDING_DIR du dialplan).
      # Volume NOMMÉ (jamais anonyme) : partagé avec le worker d'upload MinIO.
      - asterisk_recordings:/var/spool/asterisk/monitor
    networks:
      - backend
    restart: unless-stopped

  # ── Nginx ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - frontend
    depends_on:
      - web
      - api

  # ── Certbot ───────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    profiles:
      - ssl

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  valkey_data:
  meili_data:
  minio_data:
  certbot_www:
  certbot_certs:
  asterisk_recordings:   # enregistrements PDPL (Asterisk MixMonitor → worker MinIO)
  studio_worktrees:      # clone isolé + worktrees du worker-studio (Phase 3)
