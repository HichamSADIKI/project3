# ── HTTP Security Headers ──────────────────────────────────────────────────────

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restrict browser features.
# microphone=(self) : le portail client utilise la dictée vocale (composant
# besoin-form → getUserMedia / Web Speech). On autorise donc le micro pour
# notre propre origine, tout en le bloquant pour les iframes tierces.
add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;

# Force HTTPS for 1 year (enable only after SSL is confirmed working)
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Content Security Policy
add_header Content-Security-Policy "
  default-src 'self';
  script-src  'self' 'unsafe-inline';
  style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src    'self' https://fonts.gstatic.com;
  img-src     'self' data: https:;
  connect-src 'self' http://localhost:8000 https://api.sgi.infinity.ae;
  frame-ancestors 'none';
" always;

# Remove server version from responses
server_tokens off;

# Prevent cross-site scripting in older browsers
add_header X-XSS-Protection "1; mode=block" always;
