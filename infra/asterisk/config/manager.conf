; AMI (Asterisk Manager Interface) — consommé par l'API FastAPI (module
; telephony, phase 2) pour recevoir les événements d'appel et piloter
; click-to-call. NON exposé hors du réseau Docker `backend`.
;
; Ce fichier est un TEMPLATE : ${AMI_PASSWORD} est injecté au démarrage par
; entrypoint.sh depuis la variable d'environnement (jamais en clair dans l'image).

[general]
enabled=yes
port=5038
bindaddr=0.0.0.0
; En dev on accepte le réseau Docker interne. À durcir en prod (permit/deny + TLS).

[sgi-api]
secret=${AMI_PASSWORD}
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.255
permit=172.16.0.0/255.240.0.0
read=system,call,log,verbose,agent,user,config,command,dtmf,reporting,cdr,dialplan
write=system,call,agent,user,config,command,reporting,originate
