# Alertmanager SGI — routage des alertes Prometheus.
# Receivers : webhook (pont WhatsApp/comms via l'API) + e-mail (SMTP, à activer).
global:
  resolve_timeout: 5m
  # SMTP — surcharger en prod par des valeurs réelles (idéalement via secret).
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alerts@sgi.local"
  smtp_require_tls: true

route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Les alertes critiques sont répétées plus souvent.
    - matchers: ['severity="critical"']
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    # Pont vers l'API SGI → relais WhatsApp/e-mail via le module comms.
    # (Endpoint à exposer côté backend : POST /api/v1/alerts/webhook.)
    webhook_configs:
      - url: "http://api:8000/api/v1/alerts/webhook"
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: "http://api:8000/api/v1/alerts/webhook"
        send_resolved: true
    # E-mail (décommenter après avoir renseigné le SMTP global ci-dessus) :
    # email_configs:
    #   - to: "ops@infinity-uae.com"
    #     send_resolved: true

# Une alerte critique masque les warnings de même nom (réduit le bruit).
inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity="warning"']
    equal: ["alertname"]
