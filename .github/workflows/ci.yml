name: CI

# Le dépôt est enraciné au-dessus du projet : tout le code vit sous
# Desktop/SGI/SGI_Project/. Les steps s'y positionnent via working-directory.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · pytest + ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Desktop/SGI/SGI_Project/apps/api
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: sgi
      POSTGRES_USER: sgi_user
      POSTGRES_PASSWORD: sgi_password
      SECRET_KEY: ci-secret-not-for-prod
      MEILI_MASTER_KEY: ci-meili-key
      MINIO_ACCESS_KEY: ci-minio-access
      MINIO_SECRET_KEY: ci-minio-secret
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: sgi
          POSTGRES_USER: sgi_user
          POSTGRES_PASSWORD: sgi_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sgi_user -d sgi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7  # pas de tag majeur v8 publié → v7 (dernier major)
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install deps (uv)
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check app
      - name: Format (ruff format --check)
        run: uv run ruff format --check app
      - name: Types (mypy — sous-ensemble strict, voir overrides pyproject)
        run: uv run mypy app
      - name: Migrate (alembic upgrade head)
        run: uv run alembic upgrade head
      - name: Tests (pytest)
        run: uv run pytest -q

  frontend:
    name: Frontend · vitest (web + portal)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Desktop/SGI/SGI_Project
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: Desktop/SGI/SGI_Project/pnpm-lock.yaml
      - name: Install deps (pnpm)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter @sgi/portal typecheck
      - name: Unit tests (vitest)
        run: pnpm --filter sgi-web --filter @sgi/portal test
