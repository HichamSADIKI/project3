name: CI

# Le projet vit désormais à la racine du dépôt (structure aplatie).
# Le job backend se positionne dans apps/api ; le frontend reste à la racine.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · pytest + ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: sgi
      POSTGRES_USER: sgi_user
      POSTGRES_PASSWORD: sgi_password
      SECRET_KEY: ci-secret-not-for-prod
      MEILI_MASTER_KEY: ci-meili-key
      # Valkey (broker + backend Celery) : les tests d'intégration HTTP passent par
      # AuditMiddleware → write_audit_log.delay(), qui exige un broker joignable.
      # Sans ce service, chaque mutation bloquait 120 s → timeout pytest.
      VALKEY_URL: redis://localhost:6379/0
      # MinIO joignable en local (sinon l'upload de licence fournisseur bloquait sur
      # la résolution DNS de l'hôte par défaut « minio:9000 »).
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: ci-minio-access
      MINIO_SECRET_KEY: ci-minio-secret
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: sgi
          POSTGRES_USER: sgi_user
          POSTGRES_PASSWORD: sgi_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sgi_user -d sgi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # MinIO n'est pas déclaré ici : un service container GitHub ne peut pas passer
      # la commande « server /data » qu'exige l'image officielle, et bitnami/minio
      # a été retiré de Docker Hub. On le lance donc dans un step `docker run`.
    steps:
      - uses: actions/checkout@v6
      - name: Start MinIO (image officielle, commande server)
        # Lancé tôt pour qu'il soit prêt à l'heure de pytest. L'app crée le bucket
        # (make_bucket) au premier upload si besoin.
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=ci-minio-access \
            -e MINIO_ROOT_PASSWORD=ci-minio-secret \
            minio/minio:latest server /data
      - uses: astral-sh/setup-uv@v7  # pas de tag majeur v8 publié → v7 (dernier major)
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install deps (uv)
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check app
      - name: Format (ruff format --check)
        run: uv run ruff format --check app
      - name: Types (mypy — sous-ensemble strict, voir overrides pyproject)
        run: uv run mypy app
      - name: Migrate (alembic upgrade head)
        run: uv run alembic upgrade head
      - name: Wait for MinIO
        # Le runner exécute les steps sur l'hôte (pas dans un conteneur) : curl est
        # dispo nativement. On attend que MinIO réponde avant pytest.
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live; then echo "minio ready"; exit 0; fi
            echo "waiting for minio ($i/30)"; sleep 2
          done
          echo "::warning::MinIO non joignable après 60 s — les tests d'upload pourraient échouer"
      - name: Tests (pytest)
        run: uv run pytest -q

  frontend:
    name: Frontend · vitest (web + portal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pas de `version:` ici : pnpm/action-setup@v6 lit `packageManager`
      # (pnpm@9.0.0) dans package.json — spécifier les deux déclenche
      # ERR_PNPM_BAD_PM_VERSION depuis que package.json est à la racine.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install deps (pnpm)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter sgi-web --filter @sgi/portal typecheck
      - name: Unit tests (vitest)
        run: pnpm --filter sgi-web --filter @sgi/portal test
